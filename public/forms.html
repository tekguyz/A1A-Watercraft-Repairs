<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Forms Detection</title>
</head>
<body>
    <!-- This file is used by Netlify to detect forms in Next.js App Router projects -->
    <form name="a1a-repair-quote" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
        <input type="hidden" name="form-name" value="a1a-repair-quote" />
        <input type="text" name="bot-field" />
        <input type="text" name="name" />
        <input type="tel" name="phone" />
        <input type="text" name="make" />
        <select name="service">
            <option value="engine-repair">ENGINE REPAIR</option>
            <option value="sluggish-performance">SLUGGISH PERFORMANCE</option>
            <option value="routine-maintenance">ROUTINE MAINTENANCE</option>
            <option value="trailer-repair">TRAILER REPAIR</option>
            <option value="mobile-service">MOBILE/DOCKSIDE SERVICE</option>
        </select>
        <textarea name="problem-description"></textarea>
        <input type="file" name="vessel-photo" />
    </form>
</body>
</html>
